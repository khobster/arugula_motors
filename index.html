<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Arugula Motors</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="brand">
            <img class="leaf" src="arugula-flame.png" alt="Arugula Motors flame mark" width="708" height="488">
            <span class="wordmark">arugula motors</span>
        </div>

        <p class="tagline">custom-built websites and software, made for you</p>

        <h1 class="question" id="messQuestion">What software are you tired of paying for?</h1>

        <form id="messForm" class="form" novalidate>
            <input
                id="messField"
                name="mess"
                type="text"
                autocomplete="off"
                autofocus
                required
                placeholder="e.g. Toast, your site, vendor fees, anything"
                aria-labelledby="messQuestion"
            >
            <button type="submit">Send it</button>
            <p class="vent-note">(go ahead and vent &mdash; it's ok)</p>
            <p class="status" id="status" role="status" aria-live="polite"></p>
        </form>

        <p class="credibility" id="credibility">we built our own POS to replace Toast. yours can be cooler.</p>
    </main>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Arugula Motors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="brand">
            <svg class="leaf" viewBox="0 0 60 96" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <defs>
                    <linearGradient id="leafGrad" x1="30" y1="94" x2="30" y2="2" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#2f5418"/>
                        <stop offset="45%" stop-color="#5a8c3a"/>
                        <stop offset="100%" stop-color="#b8dc7a"/>
                    </linearGradient>
                    <linearGradient id="leafCore" x1="30" y1="80" x2="30" y2="8" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#7bb24a" stop-opacity="0"/>
                        <stop offset="100%" stop-color="#eaf7d0" stop-opacity="0.9"/>
                    </linearGradient>
                </defs>
                <path d="M30 94 C28 88 26 84 22 80 C12 76 6 66 12 58 C4 50 8 38 18 34 C12 24 18 14 26 8 C28 4 30 2 30 4 C30 2 32 4 34 8 C42 14 48 24 42 34 C52 38 56 50 48 58 C54 66 48 76 38 80 C34 84 32 88 30 94 Z" fill="url(#leafGrad)"/>
                <path d="M30 78 C28 72 28 64 28 56 C24 52 26 42 30 34 C30 28 30 22 30 14 C30 22 30 28 30 34 C34 42 36 52 32 56 C32 64 32 72 30 78 Z" fill="url(#leafCore)"/>
            </svg>
            <span class="wordmark">arugula motors</span>
        </div>

        <h1 class="question">What's messy in your business<br>that you'd like to clean up?</h1>

        <form id="messForm" class="form" novalidate>
            <input
                id="messField"
                name="mess"
                type="text"
                autocomplete="off"
                autofocus
                required
                aria-label="What's messy in your business that you'd like to clean up?"
            >
            <button type="submit">Send</button>
            <p class="status" id="status" role="status" aria-live="polite"></p>
        </form>

        <div class="chips" aria-label="Common asks">
            <button type="button" class="chip" data-prefill="I'd love a really cool website but always figured it'd be too expensive or I wouldn't know where to start.">a cool site, on the cheap</button>
            <button type="button" class="chip" data-prefill="I run a food business and want a cheaper, simpler POS than Toast.">toast alternative</button>
            <button type="button" class="chip" data-prefill="I want my own delivery driver system instead of paying DoorDash / Uber Eats fees.">our own delivery</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>

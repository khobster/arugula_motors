<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Arugula Motors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="brand">
            <svg class="leaf" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Arugula Motors flame mark">
                <defs>
                    <!-- Electric blue body: deep navy base → vivid cyan mid → near-white tips -->
                    <linearGradient id="blueBody" x1="50" y1="98" x2="50" y2="4" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#06163e"/>
                        <stop offset="22%" stop-color="#0c2f7a"/>
                        <stop offset="50%" stop-color="#1a6fd0"/>
                        <stop offset="78%" stop-color="#34b8f0"/>
                        <stop offset="100%" stop-color="#dffaff"/>
                    </linearGradient>
                    <!-- Horizontal sculpt: darker on outer edges, brighter mid -->
                    <linearGradient id="blueSculpt" x1="0" y1="50" x2="100" y2="50" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#040b25" stop-opacity="0.55"/>
                        <stop offset="22%" stop-color="#0a3590" stop-opacity="0.15"/>
                        <stop offset="50%" stop-color="#6cd6ff" stop-opacity="0"/>
                        <stop offset="78%" stop-color="#0a3590" stop-opacity="0.18"/>
                        <stop offset="100%" stop-color="#040b25" stop-opacity="0.55"/>
                    </linearGradient>
                    <!-- Green inner flame: deep emerald → bright jade -->
                    <linearGradient id="greenFlame" x1="50" y1="82" x2="50" y2="28" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#063b22"/>
                        <stop offset="35%" stop-color="#0e8a52"/>
                        <stop offset="72%" stop-color="#3ddc9b"/>
                        <stop offset="100%" stop-color="#dffbe8"/>
                    </linearGradient>
                    <!-- Green sculpt overlay -->
                    <linearGradient id="greenSculpt" x1="38" y1="50" x2="62" y2="50" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#022612" stop-opacity="0.45"/>
                        <stop offset="50%" stop-color="#7afac0" stop-opacity="0"/>
                        <stop offset="100%" stop-color="#022612" stop-opacity="0.4"/>
                    </linearGradient>
                    <!-- Inner radial glow giving the flame a "lit from inside" feel -->
                    <radialGradient id="innerCore" cx="50%" cy="55%" r="38%">
                        <stop offset="0%" stop-color="#bef2ff" stop-opacity="0.45"/>
                        <stop offset="100%" stop-color="#06163e" stop-opacity="0"/>
                    </radialGradient>
                    <!-- Specular glossy filter — gives the wet/sculpted-glass feel of the reference -->
                    <filter id="glossy" x="-15%" y="-15%" width="130%" height="130%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
                        <feSpecularLighting in="blur" specularExponent="32" surfaceScale="4" lighting-color="#ffffff" result="spec">
                            <feDistantLight azimuth="135" elevation="62"/>
                        </feSpecularLighting>
                        <feComposite in="spec" in2="SourceAlpha" operator="in" result="specClipped"/>
                        <feComposite in="SourceGraphic" in2="specClipped" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
                    </filter>
                    <!-- Soft drop shadow under the bouquet -->
                    <filter id="dropShadow" x="-20%" y="-10%" width="140%" height="125%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="1.6"/>
                        <feOffset dx="0" dy="2.2" result="off"/>
                        <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
                        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>

                <!-- BOUQUET OF FLAME TONGUES: rounded base, 5 upward-pointing tongues clustered
                     together (far-left, left, center-tallest, right, far-right). -->
                <g filter="url(#dropShadow)">
                    <!-- Main blue silhouette: outer flame bouquet -->
                    <path d="M10 95
                             C-2 80 0 56 10 48
                             C6 36 12 28 16 32
                             C18 32 22 38 24 46
                             C22 34 26 18 32 12
                             C34 14 38 22 40 28
                             C40 20 46 6 50 4
                             C54 6 60 20 60 28
                             C62 22 66 14 68 12
                             C74 18 78 34 76 46
                             C78 38 82 32 84 32
                             C88 28 94 36 90 48
                             C100 56 102 80 90 95
                             L 10 95 Z"
                          fill="url(#blueBody)" filter="url(#glossy)"/>
                    <!-- Horizontal sculpt overlay (darker outer edges, brighter middle) -->
                    <path d="M10 95
                             C-2 80 0 56 10 48
                             C6 36 12 28 16 32
                             C18 32 22 38 24 46
                             C22 34 26 18 32 12
                             C34 14 38 22 40 28
                             C40 20 46 6 50 4
                             C54 6 60 20 60 28
                             C62 22 66 14 68 12
                             C74 18 78 34 76 46
                             C78 38 82 32 84 32
                             C88 28 94 36 90 48
                             C100 56 102 80 90 95
                             L 10 95 Z"
                          fill="url(#blueSculpt)"/>
                    <!-- Inner radial glow -->
                    <path d="M10 95
                             C-2 80 0 56 10 48
                             C6 36 12 28 16 32
                             C18 32 22 38 24 46
                             C22 34 26 18 32 12
                             C34 14 38 22 40 28
                             C40 20 46 6 50 4
                             C54 6 60 20 60 28
                             C62 22 66 14 68 12
                             C74 18 78 34 76 46
                             C78 38 82 32 84 32
                             C88 28 94 36 90 48
                             C100 56 102 80 90 95
                             L 10 95 Z"
                          fill="url(#innerCore)"/>
                    <!-- Dark valley shadows between tongues to define the tongue separations -->
                    <path d="M24 46 C24 38 22 28 22 22 C24 28 26 38 26 46 Z" fill="#04102f" opacity="0.55"/>
                    <path d="M40 28 C40 22 38 14 38 8 C40 14 42 22 42 28 Z" fill="#04102f" opacity="0.5"/>
                    <path d="M60 28 C60 22 62 14 62 8 C60 14 58 22 58 28 Z" fill="#04102f" opacity="0.5"/>
                    <path d="M76 46 C76 38 78 28 78 22 C76 28 74 38 74 46 Z" fill="#04102f" opacity="0.55"/>

                    <!-- CENTER GREEN FLAME drawn on top (the "inner core" visible through the front) -->
                    <path d="M40 86
                             C36 78 36 66 42 56
                             C38 46 42 32 46 28
                             C48 26 52 26 54 28
                             C58 32 62 46 58 56
                             C64 66 64 78 60 86
                             C56 92 44 92 40 86 Z"
                          fill="url(#greenFlame)" filter="url(#glossy)"/>
                    <path d="M40 86
                             C36 78 36 66 42 56
                             C38 46 42 32 46 28
                             C48 26 52 26 54 28
                             C58 32 62 46 58 56
                             C64 66 64 78 60 86
                             C56 92 44 92 40 86 Z"
                          fill="url(#greenSculpt)"/>
                </g>
            </svg>
            <span class="wordmark">arugula motors</span>
        </div>

        <p class="tagline">custom websites + smart tools, made to actually look like you</p>

        <h1 class="question" id="messQuestion">What's messy in your business<br>that you'd like to clean up?</h1>

        <form id="messForm" class="form" novalidate>
            <input
                id="messField"
                name="mess"
                type="text"
                autocomplete="off"
                autofocus
                required
                aria-labelledby="messQuestion"
            >
            <button type="submit">Send</button>
            <p class="status" id="status" role="status" aria-live="polite"></p>
        </form>

        <div class="chips" aria-label="Examples of what we build">
            <button type="button" class="chip" data-prefill="I'd love a really cool website but always figured it'd be too expensive or I wouldn't know where to start.">a cool site, on the cheap</button>
            <button type="button" class="chip" data-prefill="I run a food business and want a cheaper, simpler POS than Toast.">toast alternative</button>
            <button type="button" class="chip" data-prefill="I want my own delivery driver system instead of paying DoorDash / Uber Eats fees.">own your delivery</button>
        </div>

        <p class="credibility">we built our own POS to replace Toast. yours can be cooler.</p>
    </main>

    <script src="script.js"></script>
</body>
</html>

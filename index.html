<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Arugula Motors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="brand">
            <svg class="leaf" viewBox="0 0 80 104" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Arugula Motors flame mark">
                <defs>
                    <!-- Vertical patina: deep oxidized teal at base, brightest near the tips -->
                    <linearGradient id="patinaV" x1="40" y1="100" x2="40" y2="0" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#0f3a34"/>
                        <stop offset="28%" stop-color="#1c574d"/>
                        <stop offset="58%" stop-color="#3d8c7a"/>
                        <stop offset="82%" stop-color="#7cc1ae"/>
                        <stop offset="100%" stop-color="#d5ede2"/>
                    </linearGradient>
                    <!-- Diagonal sculpt: catches light upper-left, deepens to lower-right -->
                    <linearGradient id="patinaH" x1="8" y1="30" x2="72" y2="80" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#e6f5ec" stop-opacity="0.6"/>
                        <stop offset="45%" stop-color="#5fa493" stop-opacity="0"/>
                        <stop offset="100%" stop-color="#08251f" stop-opacity="0.45"/>
                    </linearGradient>
                    <!-- Warm bronze where the patina has worn thinnest -->
                    <radialGradient id="bronze" cx="50%" cy="78%" r="40%">
                        <stop offset="0%" stop-color="#8a6435" stop-opacity="0.32"/>
                        <stop offset="100%" stop-color="#8a6435" stop-opacity="0"/>
                    </radialGradient>
                    <!-- Inner glow centered on the body of the flame -->
                    <radialGradient id="innerGlow" cx="42%" cy="55%" r="36%">
                        <stop offset="0%" stop-color="#f0fbf6" stop-opacity="0.55"/>
                        <stop offset="65%" stop-color="#7fc1ae" stop-opacity="0.1"/>
                        <stop offset="100%" stop-color="#1c574d" stop-opacity="0"/>
                    </radialGradient>
                    <!-- Rim-light highlights along the leading edge of each petal -->
                    <linearGradient id="rimL" x1="20" y1="60" x2="20" y2="12" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#f6fcf9" stop-opacity="0"/>
                        <stop offset="100%" stop-color="#f6fcf9" stop-opacity="0.85"/>
                    </linearGradient>
                    <linearGradient id="rimR" x1="68" y1="50" x2="72" y2="22" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#f6fcf9" stop-opacity="0"/>
                        <stop offset="100%" stop-color="#f6fcf9" stop-opacity="0.7"/>
                    </linearGradient>
                    <!-- Soft contact shadow under the flame -->
                    <filter id="leafShadow" x="-30%" y="-15%" width="160%" height="130%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="1.6"/>
                        <feOffset dx="0" dy="2.4" result="off"/>
                        <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
                        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                    <!-- Specular sculpting: lit from upper-left for that photographed-bronze look -->
                    <filter id="sculpt" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="1.6" result="blur"/>
                        <feSpecularLighting in="blur" specularExponent="22" surfaceScale="3.4" lighting-color="#f0faf4" result="spec">
                            <feDistantLight azimuth="135" elevation="58"/>
                        </feSpecularLighting>
                        <feComposite in="spec" in2="SourceAlpha" operator="in" result="specClipped"/>
                        <feComposite in="SourceGraphic" in2="specClipped" operator="arithmetic" k1="0" k2="1" k3="0.9" k4="0"/>
                    </filter>
                </defs>

                <!-- FLAME ANATOMY: bulbous base, four upward petals + one dramatic curl to the right
                     mirroring the Statue of Liberty torch. -->
                <g filter="url(#leafShadow)">
                    <!-- Main sculpted flame body -->
                    <path d="M28 100
                             C22 96 14 90 14 78
                             C6 70 10 56 18 54
                             C12 44 18 28 28 18
                             C26 10 34 6 36 12
                             C36 6 44 4 44 12
                             C48 8 54 14 50 22
                             C52 14 60 14 60 24
                             C62 18 70 16 72 24
                             C78 28 74 40 66 46
                             C72 50 68 60 62 60
                             C64 72 60 86 54 96
                             C50 100 30 100 28 100 Z"
                          fill="url(#patinaV)" filter="url(#sculpt)"/>
                    <!-- Bronze undertone bleeding through near the base -->
                    <path d="M28 100
                             C22 96 14 90 14 78
                             C6 70 10 56 18 54
                             C12 44 18 28 28 18
                             C26 10 34 6 36 12
                             C36 6 44 4 44 12
                             C48 8 54 14 50 22
                             C52 14 60 14 60 24
                             C62 18 70 16 72 24
                             C78 28 74 40 66 46
                             C72 50 68 60 62 60
                             C64 72 60 86 54 96
                             C50 100 30 100 28 100 Z"
                          fill="url(#bronze)"/>
                    <!-- Diagonal sculpt overlay (light/shadow direction) -->
                    <path d="M28 100
                             C22 96 14 90 14 78
                             C6 70 10 56 18 54
                             C12 44 18 28 28 18
                             C26 10 34 6 36 12
                             C36 6 44 4 44 12
                             C48 8 54 14 50 22
                             C52 14 60 14 60 24
                             C62 18 70 16 72 24
                             C78 28 74 40 66 46
                             C72 50 68 60 62 60
                             C64 72 60 86 54 96
                             C50 100 30 100 28 100 Z"
                          fill="url(#patinaH)"/>
                    <!-- Inner glow -->
                    <path d="M28 100
                             C22 96 14 90 14 78
                             C6 70 10 56 18 54
                             C12 44 18 28 28 18
                             C26 10 34 6 36 12
                             C36 6 44 4 44 12
                             C48 8 54 14 50 22
                             C52 14 60 14 60 24
                             C62 18 70 16 72 24
                             C78 28 74 40 66 46
                             C72 50 68 60 62 60
                             C64 72 60 86 54 96
                             C50 100 30 100 28 100 Z"
                          fill="url(#innerGlow)"/>
                    <!-- Shadow valleys between petals (where one petal tucks behind another) -->
                    <path d="M36 12 C36 22 38 28 38 36 C38 28 40 18 36 12 Z" fill="#0d3b32" opacity="0.4"/>
                    <path d="M44 12 C44 22 46 30 46 38 C46 30 48 20 44 12 Z" fill="#0d3b32" opacity="0.35"/>
                    <path d="M60 24 C60 32 60 40 62 46 C62 40 64 32 60 24 Z" fill="#0d3b32" opacity="0.3"/>
                    <!-- Rim-light on the leading (left) edges of the front petals -->
                    <path d="M28 18 C24 26 18 38 16 54 C18 44 24 30 30 18 Z" fill="url(#rimL)" opacity="0.7"/>
                    <!-- Rim-light along the upper edge of the curling right petal -->
                    <path d="M62 22 C68 20 72 24 72 28 C70 24 66 22 62 24 Z" fill="url(#rimR)" opacity="0.8"/>
                </g>
            </svg>
            <span class="wordmark">arugula motors</span>
        </div>

        <p class="tagline">custom websites + smart tools, made to actually look like you</p>

        <h1 class="question" id="messQuestion">What's messy in your business<br>that you'd like to clean up?</h1>

        <form id="messForm" class="form" novalidate>
            <input
                id="messField"
                name="mess"
                type="text"
                autocomplete="off"
                autofocus
                required
                aria-labelledby="messQuestion"
            >
            <button type="submit">Send</button>
            <p class="status" id="status" role="status" aria-live="polite"></p>
        </form>

        <div class="chips" aria-label="Examples of what we build">
            <button type="button" class="chip" data-prefill="I'd love a really cool website but always figured it'd be too expensive or I wouldn't know where to start.">a cool site, on the cheap</button>
            <button type="button" class="chip" data-prefill="I run a food business and want a cheaper, simpler POS than Toast.">toast alternative</button>
            <button type="button" class="chip" data-prefill="I want my own delivery driver system instead of paying DoorDash / Uber Eats fees.">own your delivery</button>
        </div>

        <p class="credibility">we built our own POS to replace Toast. yours can be cooler.</p>
    </main>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Arugula Motors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="brand">
            <svg class="leaf" viewBox="0 0 60 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <defs>
                    <!-- Vertical patina: deep oxidized teal at base, lighter copper-green at tip -->
                    <linearGradient id="patinaV" x1="30" y1="96" x2="30" y2="2" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#13403a"/>
                        <stop offset="30%" stop-color="#1f5d52"/>
                        <stop offset="60%" stop-color="#3d8c7a"/>
                        <stop offset="85%" stop-color="#74bba8"/>
                        <stop offset="100%" stop-color="#cdebe0"/>
                    </linearGradient>
                    <!-- Horizontal sculpt: highlight on the upper-left face, shadow on the lower-right -->
                    <linearGradient id="patinaH" x1="6" y1="40" x2="54" y2="60" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#d8efe5" stop-opacity="0.55"/>
                        <stop offset="40%" stop-color="#5fa493" stop-opacity="0"/>
                        <stop offset="100%" stop-color="#0d2c27" stop-opacity="0.4"/>
                    </linearGradient>
                    <!-- Inner glow simulating light catching the bronze surface -->
                    <radialGradient id="patinaCore" cx="40%" cy="58%" r="42%">
                        <stop offset="0%" stop-color="#f0fbf6" stop-opacity="0.65"/>
                        <stop offset="55%" stop-color="#7fc1ae" stop-opacity="0.15"/>
                        <stop offset="100%" stop-color="#1f5d52" stop-opacity="0"/>
                    </radialGradient>
                    <!-- Bronze warmth where the patina hasn't fully oxidized -->
                    <linearGradient id="bronzeUndertone" x1="30" y1="80" x2="30" y2="20" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#6b4a2a" stop-opacity="0.18"/>
                        <stop offset="100%" stop-color="#6b4a2a" stop-opacity="0"/>
                    </linearGradient>
                    <!-- Tip rim light -->
                    <radialGradient id="tipGlow" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#f7fdfa" stop-opacity="0.9"/>
                        <stop offset="100%" stop-color="#f7fdfa" stop-opacity="0"/>
                    </radialGradient>
                    <!-- Soft sculpted shadow under the leaf-flame -->
                    <filter id="leafShadow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="1.4"/>
                        <feOffset dx="0" dy="2" result="off"/>
                        <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
                        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                    <!-- Specular sculpting filter: lit from upper-left, gives a 3D bronze depth -->
                    <filter id="sculpt" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="1.8" result="blur"/>
                        <feSpecularLighting in="blur" specularExponent="24" surfaceScale="3" lighting-color="#eefaf3" result="spec">
                            <feDistantLight azimuth="135" elevation="62"/>
                        </feSpecularLighting>
                        <feComposite in="spec" in2="SourceAlpha" operator="in" result="specClipped"/>
                        <feComposite in="SourceGraphic" in2="specClipped" operator="arithmetic" k1="0" k2="1" k3="0.85" k4="0"/>
                    </filter>
                </defs>
                <g filter="url(#leafShadow)">
                    <!-- Base patina body -->
                    <path id="flamePath" d="M30 96 C28 90 26 86 22 82 C12 78 6 68 12 60 C4 52 8 40 18 36 C12 26 18 14 26 8 C28 4 30 2 30 4 C30 2 32 4 34 8 C42 14 48 26 42 36 C52 40 56 52 48 60 C54 68 48 78 38 82 C34 86 32 90 30 96 Z" fill="url(#patinaV)" filter="url(#sculpt)"/>
                    <!-- Bronze undertone bleed -->
                    <path d="M30 96 C28 90 26 86 22 82 C12 78 6 68 12 60 C4 52 8 40 18 36 C12 26 18 14 26 8 C28 4 30 2 30 4 C30 2 32 4 34 8 C42 14 48 26 42 36 C52 40 56 52 48 60 C54 68 48 78 38 82 C34 86 32 90 30 96 Z" fill="url(#bronzeUndertone)"/>
                    <!-- Horizontal sculpt shading -->
                    <path d="M30 96 C28 90 26 86 22 82 C12 78 6 68 12 60 C4 52 8 40 18 36 C12 26 18 14 26 8 C28 4 30 2 30 4 C30 2 32 4 34 8 C42 14 48 26 42 36 C52 40 56 52 48 60 C54 68 48 78 38 82 C34 86 32 90 30 96 Z" fill="url(#patinaH)"/>
                    <!-- Inner core glow -->
                    <path d="M30 96 C28 90 26 86 22 82 C12 78 6 68 12 60 C4 52 8 40 18 36 C12 26 18 14 26 8 C28 4 30 2 30 4 C30 2 32 4 34 8 C42 14 48 26 42 36 C52 40 56 52 48 60 C54 68 48 78 38 82 C34 86 32 90 30 96 Z" fill="url(#patinaCore)"/>
                    <!-- Tip rim-light glow -->
                    <ellipse cx="30" cy="7" rx="5" ry="6" fill="url(#tipGlow)"/>
                </g>
            </svg>
            <span class="wordmark">arugula motors</span>
        </div>

        <p class="tagline">custom websites + smart tools, made to actually look like you</p>

        <h1 class="question">What's messy in your business<br>that you'd like to clean up?</h1>

        <form id="messForm" class="form" novalidate>
            <input
                id="messField"
                name="mess"
                type="text"
                autocomplete="off"
                autofocus
                required
                aria-label="What's messy in your business that you'd like to clean up?"
            >
            <button type="submit">Send</button>
            <p class="status" id="status" role="status" aria-live="polite"></p>
        </form>

        <div class="chips" aria-label="Examples of what we build">
            <button type="button" class="chip" data-prefill="I'd love a really cool website but always figured it'd be too expensive or I wouldn't know where to start.">a cool site, on the cheap</button>
            <button type="button" class="chip" data-prefill="I run a food business and want a cheaper, simpler POS than Toast.">toast alternative</button>
            <button type="button" class="chip" data-prefill="I want my own delivery driver system instead of paying DoorDash / Uber Eats fees.">own your delivery</button>
        </div>

        <p class="credibility">we built our own POS to replace Toast. yours can be cooler.</p>
    </main>

    <script src="script.js"></script>
</body>
</html>
